[relaychain]
chain = "rococo-local"
default_args = [
    "--no-hardware-benchmarks",
    "-lparachain=debug",
    "--database=paritydb",
]
default_command = "tmp/polkadot"
rpc_port = 31000

[[relaychain.nodes]]
add_to_bootnodes = true
name = "relay-0"
rpc_port = 31000
validator = true

[[relaychain.nodes]]
add_to_bootnodes = true
name = "relay-1"
validator = true


[[parachains]]
id = 2000

[[parachains.collators]]
args = ["--no-hardware-benchmarks", "-lparachain=debug"]
command = "../target/release/storage-hub-node"
name = "sh-collator"
rpc_port = 32000


[[parachains.collators]]
args = [
    "--no-hardware-benchmarks",
    "-lparachain=debug",
    "--provider",
    "--provider-type bsp",
    "--max-storage-capacity 4294967295",
    "--jump-capacity=1073741824",
]
command = "../target/release/storage-hub-node"
name = "sh-BSP"
rpc_port = 35000
validator = false

[[parachains.collators]]
args = [
    "--no-hardware-benchmarks",
    "-lparachain=debug",
    "--provider",
    "--provider-type user",
]
command = "../target/release/storage-hub-node"
name = "sh-User"
rpc_port = 36000

[types.Header]
number = "u64"
parent_hash = "Hash"
post_state = "Hash"

[settings]
provider = "native"
