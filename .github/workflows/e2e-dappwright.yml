name: E2E DappWright (MetaMask)

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_COLOR: 1
  HEADLESS: false

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm & cache
        uses: ./.github/workflow-templates/setup-pnpm
        with:
          node_version: 23

      - name: Install Rust toolchain (for wasm)
        uses: actions-rust-lang/setup-rust-toolchain@v1.8
        with:
          target: wasm32-unknown-unknown
          cache: false

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install dependencies (sdk)
        working-directory: sdk
        run: pnpm install

      - name: Build SDK (core dist + wasm)
        working-directory: sdk
        run: pnpm build

      - name: Install e2e deps (sdk/e2e)
        working-directory: sdk/e2e
        run: pnpm install --ignore-workspace

      - name: Install Playwright Chromium with system deps (sdk/e2e)
        working-directory: sdk/e2e
        run: |
          pnpm exec playwright install --with-deps chromium

      # Playwright webServer in config will start/stop the server
      - name: Run Playwright tests (xvfb) (sdk/e2e)
        working-directory: sdk/e2e
        run: |
          xvfb-run -a pnpm exec playwright test --project metamask

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: /tmp/playwright-report/
          retention-days: 14

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: /tmp/test-results/
          retention-days: 14


