name: AI Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.2-codex' }}

jobs:
  prepare:
    name: Prepare AI review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      selected_prompts: ${{ steps.select.outputs.selected_prompts }}
      selected_count: ${{ steps.select.outputs.selected_count }}
    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Resolve PR context and authorise trigger
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);

            let shouldRun = false;
            let skipReason = '';
            let pr = null;

            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;

              if (pr.head.repo.fork) {
                skipReason = 'Fork pull requests require a maintainer to trigger `/ai-review`.';
              } else {
                shouldRun = true;
              }
            } else if (context.eventName === 'issue_comment') {
              const issue = context.payload.issue;
              const commentBody = (context.payload.comment.body || '').trim();
              const association = context.payload.comment.author_association;

              if (!issue.pull_request) {
                skipReason = 'Comment is not on a pull request.';
              } else if (!commentBody.startsWith('/ai-review')) {
                skipReason = 'Comment does not request AI review.';
              } else if (!allowedAssociations.has(association)) {
                skipReason = `Comment author association ${association} is not allowed to trigger AI review.`;
              } else {
                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: issue.number,
                });

                pr = data;
                shouldRun = true;
              }
            } else {
              skipReason = `Unsupported event: ${context.eventName}`;
            }

            let changedFiles = [];
            if (shouldRun && pr) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });

              changedFiles = files.map((file) => file.filename);
            }

            fs.writeFileSync('changed-files.json', JSON.stringify(changedFiles, null, 2));

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('skip_reason', skipReason);
            core.setOutput('pr_number', pr ? String(pr.number) : '');
            core.setOutput('base_ref', pr ? pr.base.ref : '');
            core.setOutput('base_sha', pr ? pr.base.sha : '');
            core.setOutput('head_ref', pr ? pr.head.ref : '');
            core.setOutput('head_sha', pr ? pr.head.sha : '');

      - name: Select matching AI reviewers
        id: select
        run: |
          set -euo pipefail

          if [ "${{ steps.resolve.outputs.should_run }}" != "true" ]; then
            echo "[]" > selected-prompts.json
          else
            bun ./scripts/select_ai_review_prompts.ts \
              .github/ai-review/reviewers.json \
              changed-files.json > selected-prompts.json
          fi

          echo "Selected reviewers:"
          jq '.' selected-prompts.json

          echo "selected_prompts=$(jq -c '.' selected-prompts.json)" >> "$GITHUB_OUTPUT"
          echo "selected_count=$(jq 'length' selected-prompts.json)" >> "$GITHUB_OUTPUT"

      - name: Log skipped trigger
        if: steps.resolve.outputs.should_run != 'true'
        run: echo "${{ steps.resolve.outputs.skip_reason }}"

  review:
    name: AI review (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true' && needs.prepare.outputs.selected_count != '0'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.selected_prompts) }}
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ needs.prepare.outputs.pr_number }}/merge
          fetch-depth: 1

      - name: Fetch base and head refs
        env:
          BASE_REF: ${{ needs.prepare.outputs.base_ref }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}" "+refs/pull/${PR_NUMBER}/head"

      - name: Build Codex review prompt
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          REVIEWER_NAME: ${{ matrix.name }}
          PROMPT_TEMPLATE: ${{ matrix.prompt }}
          BASE_REF: ${{ needs.prepare.outputs.base_ref }}
          HEAD_REF: ${{ needs.prepare.outputs.head_ref }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          MATCHED_FILES_JSON: ${{ toJson(matrix.matched_files) }}
        run: |
          set -euo pipefail

          cp "${PROMPT_TEMPLATE}" codex-prompt.md

          {
            echo ""
            echo "Repository: ${REPOSITORY}"
            echo "Pull Request #: ${PR_NUMBER}"
            echo "Reviewer: ${REVIEWER_NAME}"
            echo "Base ref: ${BASE_REF}"
            echo "Head ref: ${HEAD_REF}"
            echo "Base SHA: ${BASE_SHA}"
            echo "Head SHA: ${HEAD_SHA}"
            echo "Matched files for this reviewer:"
            printf '%s\n' "${MATCHED_FILES_JSON}" | jq -r '.[]'
            echo ""
            echo "Changed files:"
            git --no-pager diff --name-status "${BASE_SHA}" "${HEAD_SHA}"
            echo ""
            echo "Unified diff (context=5):"
            git --no-pager diff --unified=5 --stat=200 "${BASE_SHA}" "${HEAD_SHA}" > /tmp/diffstat.txt
            git --no-pager diff --unified=5 "${BASE_SHA}" "${HEAD_SHA}" > /tmp/full.diff
            cat /tmp/diffstat.txt
            echo ""
            cat /tmp/full.diff
          } >> codex-prompt.md

      - name: Run Codex structured review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.md
          output-schema-file: .github/ai-review/output-schema.json
          output-file: codex-output.json
          sandbox: read-only
          safety-strategy: drop-sudo
          model: ${{ env.CODEX_MODEL }}

      - name: Inspect Codex output
        if: always()
        run: |
          if [ -s codex-output.json ]; then
            jq '.' codex-output.json
          else
            echo "Codex output file missing."
          fi

      - name: Publish inline review comments
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          REVIEWER_NAME: ${{ matrix.name }}
        with:
          script: |
            const fs = require('fs');

            const skippedFindingsPath = 'skipped-inline-findings.json';
            fs.writeFileSync(skippedFindingsPath, '[]\n');

            if (!fs.existsSync('codex-output.json') || fs.statSync('codex-output.json').size === 0) {
              core.info('No Codex output file present; skipping inline comments.');
              return;
            }

            const review = JSON.parse(fs.readFileSync('codex-output.json', 'utf8'));
            const findings = Array.isArray(review.findings) ? review.findings : [];

            if (findings.length === 0) {
              core.info('Codex returned no findings; skipping inline comments.');
              return;
            }

            function getCommentableRightSideLines(patch) {
              const lines = new Set();

              if (!patch) {
                return lines;
              }

              let currentNewLine = null;
              for (const patchLine of patch.split('\n')) {
                const hunkHeader = patchLine.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkHeader) {
                  currentNewLine = Number(hunkHeader[1]);
                  continue;
                }

                if (currentNewLine === null || patchLine.startsWith('\\')) {
                  continue;
                }

                if (patchLine.startsWith('+') && !patchLine.startsWith('+++')) {
                  lines.add(currentNewLine);
                  currentNewLine += 1;
                  continue;
                }

                if (patchLine.startsWith(' ')) {
                  lines.add(currentNewLine);
                  currentNewLine += 1;
                  continue;
                }

                if (patchLine.startsWith('-') && !patchLine.startsWith('---')) {
                  continue;
                }
              }

              return lines;
            }

            const prNumber = Number(process.env.PR_NUMBER);
            const prFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const commentableLinesByPath = new Map(
              prFiles.map((file) => [file.filename, getCommentableRightSideLines(file.patch)]),
            );

            const skippedFindings = [];
            let postedInlineCount = 0;

            for (const finding of findings) {
              const filePath = finding.code_location?.file_path;
              const line = finding.code_location?.line_range?.end;
              const commentableLines = commentableLinesByPath.get(filePath);

              if (!filePath || typeof line !== 'number' || !commentableLines?.has(line)) {
                skippedFindings.push({
                  ...finding,
                  skip_reason: 'GitHub could not resolve the requested line on the pull request diff.',
                });
                continue;
              }

              const body =
                `[${process.env.REVIEWER_NAME}] ${finding.title}\n\n` +
                `${finding.body}\n\n` +
                `Confidence: ${finding.confidence_score}\n` +
                `Priority: P${finding.priority}`;

              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: process.env.HEAD_SHA,
                  path: filePath,
                  line,
                  side: 'RIGHT',
                  body,
                });

                postedInlineCount += 1;
              } catch (error) {
                skippedFindings.push({
                  ...finding,
                  skip_reason: error instanceof Error ? error.message : 'Failed to publish inline comment.',
                });
              }
            }

            fs.writeFileSync(skippedFindingsPath, `${JSON.stringify(skippedFindings, null, 2)}\n`);
            core.info(`Posted ${postedInlineCount} inline comments; ${skippedFindings.length} findings were kept for the summary comment.`);

      - name: Create summary comment
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEWER_NAME: ${{ matrix.name }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const fs = require('fs');

            const marker = `<!-- ai-review:${process.env.REVIEWER_NAME}:run-${process.env.RUN_ID}-attempt-${process.env.RUN_ATTEMPT} -->`;
            let body;
            let skippedFindings = [];

            if (fs.existsSync('skipped-inline-findings.json') && fs.statSync('skipped-inline-findings.json').size > 0) {
              skippedFindings = JSON.parse(fs.readFileSync('skipped-inline-findings.json', 'utf8'));
            }

            if (!fs.existsSync('codex-output.json') || fs.statSync('codex-output.json').size === 0) {
              body = [
                marker,
                `## AI review: \`${process.env.REVIEWER_NAME}\``,
                '',
                `Run: [#${process.env.RUN_ID} (attempt ${process.env.RUN_ATTEMPT})](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID})`,
                '',
                'The reviewer did not produce structured output. Please inspect the workflow run.',
              ].join('\n');
            } else {
              const review = JSON.parse(fs.readFileSync('codex-output.json', 'utf8'));
              const findingsCount = Array.isArray(review.findings) ? review.findings.length : 0;
              const status = review.overall_status || 'fail';
              const summaryLines = [
                marker,
                `## AI review: \`${process.env.REVIEWER_NAME}\``,
                '',
                `Run: [#${process.env.RUN_ID} (attempt ${process.env.RUN_ATTEMPT})](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID})`,
                '',
                `Status: \`${status}\``,
                `Findings: ${findingsCount}`,
                '',
                review.overall_explanation,
              ];

              if (skippedFindings.length > 0) {
                summaryLines.push('');
                summaryLines.push('### Findings not posted inline');
                summaryLines.push('');

                for (const finding of skippedFindings) {
                  const filePath = finding.code_location?.file_path ?? 'unknown file';
                  const start = finding.code_location?.line_range?.start;
                  const end = finding.code_location?.line_range?.end;
                  const lineRange = start && end ? `${start}-${end}` : 'unknown line';

                  summaryLines.push(`- \`${filePath}:${lineRange}\` - **${finding.title}**`);
                  summaryLines.push(`  ${finding.body}`);
                }
              }

              body = summaryLines.join('\n');
            }

            const issueNumber = Number(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
