id: 2
name: Runtime Subsystem
description: >
  The on-chain Substrate runtime layer comprising two variants: a Polkadot
  parachain (cumulus-based, for shared security and XCM interoperability)
  and a solochain-EVM (Frontier-based, for standalone EVM-compatible
  deployments). Both share six core storage pallets with identical logic,
  differing only in consensus mechanism and additional infrastructure
  pallets. The runtime enforces storage economics, proof verification,
  payment streams, and provider lifecycle on-chain.
status: canonical
intent:
  kind: service
  summary: >
    On-chain runtime with two variants (parachain + solochain-EVM) sharing
    six core storage pallets.
  source: human
  goals:
    - Enforce storage economics and proof verification on-chain
    - Maintain parity between parachain and solochain-EVM variants
    - Support forkless runtime upgrades via WASM
  non_goals:
    - The runtime does not handle off-chain file storage or transfer
  rationale: >
    Two runtime variants prove StorageHub's pluggability thesis. The
    parachain targets Polkadot ecosystem integration, the solochain-EVM
    targets standalone deployments with Ethereum tooling compatibility.
